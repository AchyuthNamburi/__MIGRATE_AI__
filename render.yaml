services:
  - type: web
    name: migrateai
    env: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: celery -A backend.workers.celery_app worker --loglevel=info & uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    pythonVersion: 3.11    # ✅ Correct indentation
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: migration_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true